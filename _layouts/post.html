---
layout: default
---
<a href="{{ '/' | relative_url }}" class="back-link">&larr; all posts</a>

<article>
  <header>
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      {{ page.date | date: "%B %-d, %Y" }}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
